front:
  text: 上清眀鑑要經滿九
  hash: sha256:ffc0db255e49d0328a3ed171ee309204fa952e7bbf24139de9aab6e8d8605658
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0015_HFL_000-001a, image: hfl/0876/0876-150.png}
body:
  text: 凡行持先沐浴齊戒解淨身體衣被洗浣令新潔以香薰之作明鏡法經第一照鏡欲見形之法當小開户居暗向明暫閉目思想見面形初時漠漠殊無所見中宿之後漸漸洞遠自見面目巾幘心中眼眼開明平旦及日入此時最好若日盛明當小閉户在灼灼中窺鏡終無所見也火下照鏡當以火自遠勿得逼近火欲開目照鏡自視形體當在灼灼明中無苦若欲閉目思見面形當居暗向明然後見耳照照鏡大要當安卧思想精誠未卧之間體條條常須臾之頃當有赤黃從額上出照耀一室中於是倣佛恍惚如覺如卧便自見面形在光中對共相視如頃即便消滅卧覺之後輒復照鏡欲卧便卧思之如前法當夕夕自見也或卧覺兩面相對或見己形兩人共併坐或卧寐之間見好神童玉女年十五六好衣服頭額正見輒再拜或耳邊聞語聲天下吉凶萬事皆預知之或在壁東見壁西或暮卧夢照鏡或還光內視五藏照鏡當以甲始立規之法以明鏡九寸無令面中有疵瑕正令清明左右各一去人一尺五寸與目齊澡鋅盛井華水著下也夜照鏡宜用麻油火也自見其形分明下地再拜長跪言吾與子同體令子分形萬千乞丐常與子相隨身形不衰萬年相隨受視中明鏡先視形見衆物聽聞人語聲修明鏡有三童九女侍之三童長六尺九女長五尺青腰青衣當間衣紫內子衣黑素女衣白皇女衣黃帳上衣緗道女衣黃女嬰衣紅曾女衣絳明鏡君官屬將百二十人治開陽宫主人兩目童子精光相視見景知吉凶真人道士摩鏡經第二昔有摩鏡道士遊行民間賃為百姓摩鏡鏡無大小財費六七錢耳不以他物摩也唯以藥塗面拭之而鏡光明不常有好事袁仲陽者知其有道乃要留使宿為好設主人乃拜而請問之道士告仲陽曰明鏡之道可以分形變化以一為萬又能令人聰明逆知方來之事又能令人與天上諸神仙見行其道得法則天上諸神仙皆來至道士自見己身則長生不老還成少童又道士入山精思山精老魅多來試之或作人形故道士在石室之中常當懸明鏡九寸於背後以辟衆惡又百鬼老怪雖能變形而不能使鏡中影變也見其形物鏡中則便消亡退走不敢為害也是以道士有摩鏡之藥藥方出於白子高方用錫四兩燒釜猛下火令釜正赤與火同色乃內錫又末胡粉三兩合內其中以生白楊刻作人令長一尺廣二寸厚一寸其後柄長短在人耳以此攪之手無消息盡此人七寸又復內真丹四兩胡粉一兩復攪之人餘二寸內摩鏡錫四兩攪令相得欲用時末如胡豆以唾和之得膒脂為善又以如米者於前齒上噓之後以唾傅拂其上以自拂之即明如日月欲作藥先齊戒七日乃為之作清淨密處勿令人見之也其火欲猛祕之勿妄傳非其人甲子旬十日向卯甲戌旬十日向丑甲申旬十日向亥甲午旬十日向酉甲辰旬十日向未甲寅旬十日向巳夫欲致六丁玉女法皆當向其旬便溺周而復始神女即至矣萬害皆除也老子百華散辟兵度世方第三其方能辟三兵却衆邪解厄難延年命得之者長生雄黃丹砂款冬花遠志四物各二分異治合以七月百草花成末二升攪和之若凶年多疾疫服半錢七先服之禁薰菜及六畜肉若有縣官之急兵賊見圍及船行遭風以水一斗以和藥一兩以洗面及浴身體此一升可足周三人當又以和少許以備卒急若不得洗浴當服如小豆者二丸厄即自度也若他人弟子運命有厄者以藥與之即可免脫矣祕之金匱勿妄傳其非人也仙人神酒方第四蜀椒半升桂半升甘草半升附子五枚好麴半升乾薑半升苦參半升乾棗肥好者半升八物合治下篩好醇酒一斛漬之出曝乾之復漬之如此期以盡酒成矣以油囊盛之急絞其口無令泄也若欲作酒時以斗水以方寸匕藥投水中攪之即成酒矣亦可以蜜丸之餌冬天以暖水漬之仙人行萬里而不乏酒者正以此也神仙除百病枕藥方第五太山下老翁者失其名字漢武東巡見老翁鋤於道背上有白光高數尺帝怪而問之有何道術老翁對曰臣昔年八十五時衰老垂死頭白齒落有道士者教臣服棗飲水絶穀并作神枕枕中有三十二物其三十二物以當二十四氣其八毒以應八風臣行之轉少黑髮更生墜齒復出日行三百里臣今百八十矣不能棄世入山顧戀孫子復還食穀已二十餘年猶得神枕之力住不復老武帝視老翁顔狀當如五十許人驗問其鄰比皆云信然帝乃從受其方作其枕而不能隨其絶穀飲水也方用五月五日若七月七日取山林柏木板以為枕長一尺二寸高四寸空中容一斗二升以柏心赤者為蓋厚四分善致之令密又當使可開閉也又鑽蓋上為三行行四十孔凡一百二十孔孔令容粟米也其藥用芎藭當歸白芷辛夷杜衡白术藁本木蘭蜀椒桂乾薑防風人參桔梗飛廉柏實白蘅秦椒荆實一書云壯荆實肉蓯蓉薏苡子款冬花蘼蕪凡二十四物以應二十四氣加毒者烏頭附子藜盧皂莢莽草礬石半夏細辛凡三十二物書云各一兩皆㕮咀以毒藥上安之滿枕中布囊以衣枕百日面有光澤一年體中所疾及有風疾一皆愈瘥而身盡香四年白髮變黑齒落更生耳目聰明方神驗祕不傳非其人也藁本是老芎藭母也武帝以問東方朔答昔女廉以此方傳玉青青以傳廣成子廣成子以傳黃帝近者穀城道士淳于公枕此藥枕年百餘歲而頭髮不白夫百病之來皆從人陽脉起今枕此藥枕風邪不得侵人矣又雖以布囊衣枕猶當復以韋囊重苞之須欲卧枕時乃脫去之耳詔賜老翁匹帛老翁不受曰臣之於君猶子之於父也子知道以上之於父義不受賞又臣非賣道者以陛下好善信道故上此耳帝止而更賜以諸藥也道士九節杖法一節名太隂星二節名熒惑星三節名角星四節名衡星五節名張星六節名營室星七節名鎮星八節名東井星九節名拘星老子枕中符及藥方第六若居不安衰耗多病者但以家長佩之則一門安樂若他人有卒死而身體未冷者以此藥如大豆二丸吞之即活也若人或困不能復吞以棒校其口令開與藥得咽便活也若惡歲時多疫及癘遠行在他方國不便水土當以月旦清朝服之一丸如大豆并佩之如法當合藥之時及佩藥皆當先沐浴齊戒然後佩之佩之令人辟萬病却百鬼消五兵宜仕官保子孫不逢禍害無不利佩藥之後體上所著故衣皆不得復以借異人著之也此藥及符甚祕之不傳非其人方用胡桃天雄桃膠雄黃巴豆蜀椒真珠犬膽虎掌虎牙女青白石英茵蔯蒿右十三物各一兩半合符為十四物也搗下細篩以生姜二斤細切絞取汁以和藥乃搗六百杵若姜汁少者可以白蜜益之訖乃雀卵三丸以三寸絳為幐囊白絹為裏當以朱書絹作第一符然後乃合絳為幐囊也繫之男左女右又搗藥之時當西北向隂呪之曰五行相推天地正舒足躡文昌心託太清隂陽氣和與我合并奎婁胃昴西北向隂南斗主生身佩日月往造天庭所在聽過急急如道令若有惡異夢寤以三丸著枕中也老子玉匣中種芝經神仙祕事第七石室中文老子曰咨爾兆人皆知生之為樂死之為惡而莫知所以自生也千術萬藥入兆身正可得老壽千歲已還數百年以上耳終不能使兆飛行登仙上朝天皇也木藥之善者松脂也此木生茯苓有脂肥故也其葉實皆可服也草之善者榮華黃精天門冬山薊也正宜長服不得一日有廢也可得五百年以還耳其不能與天地相畢後世方士增加其說以誤學者吾深愍之八石丸丹雲母玉漿服之當斷房內血食汙辱葷菜卧名山石室之中一年乃可得與鬼神相見不死而已亦不能使兆飛行輕舉乘雲也兆聞仙人服芝英不耶此豈空言也夫名山之隂陽精泉水之上古木之下亦生芝而其所禀皆山水土木之精不能立使人仙也踰於凡草耳其積丹砂之上積黃金之上積曾青之上積雄黃之上皆生芝此芝非至德感神者逢而不見而不得食也此芝所以能使人立仙者受此四物之至精含天地隂陽之和氣蒸薰之津液以得生成其味乃神於此四物之本體也今但取此四物搗治服之為益若加之以感應會納之於爐釜之中其精上飛掃而服之則百倍於草藥不徒爾服之也要得天地之淳氣下接引此四物之精液而令其上更成生物不亦當復百倍於其上著土釜者耶余將去矣顧念億兆將成灰土哀哉今撰天文芝其有骨命者當得吾此文其先人有罪其身不得應長生亦不得吾書藏之名山石函九重之下無妄傳愼之哉愼之哉當以立春之日掘家東寅地宅內外無在也要欲得善土非灰壤者掘為坑令深三尺方三尺以曾青一斤治為屑裹以羊附來沃以青葙一升復其土築其上七日當有青雲來覆其上七十日生青氣連其上青雲也百日上生芝其狀如圖以寅卯之日從日下以青繒三尺執骨刀禹步而刺取之愼無以顧也歸隂乾百日治為屑服一刀圭以井花水日服三芝盡即能輕舉當有神來迎之白日升天與天地無窮矣當以立夏之日於南山之陽掘地為坑深八尺方八尺以丹砂二斤治為屑裹以雄黃赤色者碎研去其夾石以丹屑納其中沃以玄參二升復上土築其上八日當有赤雲常覆之八十日上生赤氣如煙與赤雲連百日上生赤芝如圖狀以巳午之日從日下禹步以絳組緹繒八尺以木刀採之再拜而去勿復顧也還隂乾百日治服方寸匕日一皆以清旦日始出未一丈時以井花水送之盡則三尸九蟲七疾野犬肺瘕積聚百病皆化為濁血從鼻口中出以井花水洗之即能步行水上焰火不灼絶穀不食去世者勿入房室絶血食即有龍車衆仙來迎之欲止民間愼勿種此芝也當以立秋之日於西山之隂掘地為坑深六尺方六尺以黃金一斤火洋之投坑中灌以靈山鶴膝草一升清酒一斛浮萍一斛覆其上土築之六日上有白雲來覆之六十日上生黃氣如蒸上連白雲百日上生黃芝如圖狀以申酉日申酉時從日下以白素六尺禹步以金刀採之再拜而去無復顧還隂乾百日治眼三指攝芝盡老者更少少者華色生頭白皆黑齒落更生當以立冬之日於北山之隂掘地為坑深入五尺方五尺埋雄黃三斤治之以熟銅器盛之灌以麻油二升覆以雄黃粉一斤復土築之五日上有黑雲來覆之五十日上生紫氣與黑雲連百日上生紫芝如圖狀其夜則光照一里之內天隂見毫毛也以壬癸日從日下以角刀禹步以黑繒五尺採之再拜去勿後顧也隂乾百日以子亥日治末服五分匕日一以夜半時北向服之也芝盡則老化為童子女人亦可服此芝者司命太一遣仙官下迎之壽與天同斫刺不入火燒不燥溺水不濕五毒遠之邪鬼避之不知飢渴服此四芝皆長生無死期所在致天官行厨亦可不食行輒所在山澤供給龍虎之乘鬼神朝拜受使祕之論者曰以此言之天地隂陽之數能變生萬物不可云無譬如陽燧之取火隂燧之取水而截竹生火何謂之不感乎其有丹砂之釜變成水銀感動太陽之精何物之不可化化何物而不成假託物類變化而生藏之金匱愼勿漏泄道有骨命之者乃逢汝形勤加修善司命除其死籍天地俱并遊於九天之上展轉六合之中神通洞達永享無窮青青圖青青則如翠羽百日不改色也上清明鑑要經
